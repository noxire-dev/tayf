name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Match the project's declared engines and README ("Node.js 24+").
          # Next 16 + React 19 require >=18.18 to run, but the worker-stream
          # codebase has only been smoke-tested on the Node 24 family. Pin
          # the major to keep CI honest with local dev.
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm test
