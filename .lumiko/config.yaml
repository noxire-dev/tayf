# Lumiko Configuration
# Docs: https://github.com/mirako-dev/lumiko

version: 1
project:
  name: tayf
  description: ''
include:
  - src/**/*
  - lib/**/*
  - '*.ts'
  - '*.js'
  - '*.py'
exclude:
  - node_modules/**
  - dist/**
  - build/**
  - .git/**
  - '*.lock'
  - '*.log'
output:
  directory: docs
  formats:
    - markdown
    - context
docs:
  readme: true
  architecture: true
  api: true
  diagrams: true
claude:
  backend: claude-code
  model: claude-sonnet-4-20250514
  maxTokens: 8192
